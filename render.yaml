services:
  - type: web
    name: imperial-erp-alana
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build
    startCommand: npm run db:deploy -w @imperial/api && npm run db:seed -w @imperial/api && npm run start -w @imperial/api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: WEB_ORIGIN
        value: https://imperial-erp-alana.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: imperial-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INTEGRATION_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_NAME
        value: Administrador Imperial
      - key: ADMIN_EMAIL
        value: admin@imperial.local
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: imperial-erp-db
    databaseName: imperial_erp
    user: imperial
    plan: free
