services:
  postgres:
    image: postgres:17-alpine
    container_name: imperial-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: imperial
      POSTGRES_PASSWORD: imperial
      POSTGRES_DB: imperial_erp
    ports:
      - "5432:5432"
    volumes:
      - imperial-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imperial -d imperial_erp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  imperial-postgres:
